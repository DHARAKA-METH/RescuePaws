services:
  mysql:
    image: mysql:8.1
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: auth_db
    ports:
      - "3310:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - rescuepaws-network

  auth-service:
    build:
      context: ./RescuePaws-backend/auth-service
    container_name: auth-service
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      - mysql
    networks:
      - rescuepaws-network

  dog-service:
    build:
      context: ./RescuePaws-backend/dog_service
    container_name: dog-service
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dog_service?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      - mysql
    networks:
      - rescuepaws-network

  #  API Gateway instances
  api-gateway-1:
    build:
      context: ./RescuePaws-backend/api-gateway
    container_name: api-gateway-1
    restart: always
    environment:
      SERVER_PORT: 8080
    depends_on:
      - auth-service
      - dog-service
    networks:
      - rescuepaws-network

  api-gateway-2:
    build:
      context: ./RescuePaws-backend/api-gateway
    container_name: api-gateway-2
    restart: always
    environment:
      SERVER_PORT: 8080
    depends_on:
      - auth-service
      - dog-service
    networks:
      - rescuepaws-network

  #  NGINX
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-gateway-1
      - api-gateway-2
    networks:
      - rescuepaws-network

  frontend:
    build:
      context: ./rescuepaws-frontend
    container_name: rescuepaws-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - nginx   
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    networks:
      - rescuepaws-network

volumes:
  mysql-data:

networks:
  rescuepaws-network: